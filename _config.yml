about_bio: >
  Yenilikçi fikirlere açık, çözüm odaklı bir Endüstriyel Tasarımcıyım. 
  Tasarımı sadece bir iş değil, hayatı kolaylaştıran bir araç olarak görüyorum. 
  Eğitimim boyunca teorik bilgimi freelance projelerle destekledim. 
  Ürün görselleştirme ve konsept tasarımı gibi alanlarda çalışarak, 
  fikirleri profesyonel sunumlara dönüştürme konusunda deneyim kazandım. 
  Hedefim estetik ve fonksiyonu birleştirerek hikayesi olan ürünler yaratmak. 
  Kullanıcı deneyimini merkeze alan, sürdürülebilir ve akılcı tasarımlar üretmek en büyük motivasyonum.

